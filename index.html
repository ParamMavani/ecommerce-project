  const checkStrength = (v) => {
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    setStrength(v.length === 0 ? 0 : s);

    if (!form.email || !form.password) return addToast('Please fill all fields', 'error');

    if (!form.name || !form.email || !form.password) return addToast('Please fill all fields', 'error');

const ShopPage = ({ products, setPage, addToCart, toggleWishlist, wishlist, addToast, searchQuery, initialCategory, onCategoryChange }) => {
  const [selectedCat, setCat] = useState(initialCategory || 'All');
  useEffect(() => { if (initialCategory) setCat(initialCategory); }, [initialCategory]);
  const handleCatChange = (cat) => { setCat(cat); if (onCategoryChange) onCategoryChange(cat); };
  const [sort, setSort] = useState('featured');
  const [priceMin, setPriceMin] = useState('');
  const [priceMax, setPriceMax] = useState('');
  const [minRating, setMinRating] = useState(0);
  const [inStockOnly, setInStockOnly] = useState(false);
  let filtered = products.filter(p => {
    if (selectedCat !== 'All' && p.category !== selectedCat) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase()) && !p.category.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    if (priceMin && p.price < parseInt(priceMin)) return false;
    if (priceMax && p.price > parseInt(priceMax)) return false;
    if (p.rating < minRating) return false;
    if (inStockOnly && p.stock === 0) return false;
    return true;
  });
  const sorted = [...filtered].sort((a, b) => {
    if (sort === 'price-asc') return a.price - b.price;
    if (sort === 'price-desc') return b.price - a.price;
    if (sort === 'rating') return b.rating - a.rating;
    if (sort === 'newest') return b.isNew - a.isNew;
    return b.reviews - a.reviews;
  });
  return (
    <div className="page">
      <div className="container">
        <div style={{marginBottom:28}}>
          <h1 className="section-title">{searchQuery ? `Results for "${searchQuery}"` : selectedCat === 'All' ? 'All Products' : selectedCat}</h1>
          <p style={{fontSize:14,color:'var(--c-ink3)',marginTop:4}}>{sorted.length} products found</p>
        </div>
        <div className="shop-layout">
          <aside>
            <div className="filter-panel">
              <div className="filter-title">Filters</div>
              <div className="filter-group">
                <div className="filter-label">Category</div>
                {CATEGORIES.map(cat => (
                  <label key={cat} className="filter-option">
                    <input type="radio" name="cat" checked={selectedCat===cat} onChange={() => handleCatChange(cat)} />
                    <span>{cat} {cat!=='All' && `(${products.filter(p=>p.category===cat).length})`}</span>
                  </label>
                ))}
              </div>
              <div className="filter-group">
                <div className="filter-label">Price Range</div>
                <div className="price-range">
                  <input placeholder="Min" value={priceMin} onChange={e=>setPriceMin(e.target.value)} type="number" />
                  <span>—</span>
                  <input placeholder="Max" value={priceMax} onChange={e=>setPriceMax(e.target.value)} type="number" />
                </div>
              </div>
              <div className="filter-group">
                <div className="filter-label">Min Rating</div>
                {[4,3,2,1,0].map(r => (
                  <label key={r} className="filter-option">
                    <input type="radio" name="rating" checked={minRating===r} onChange={() => setMinRating(r)} />
                    <span>{r === 0 ? 'All' : <>{Array(r).fill('★').join('')} & above</>}</span>
                  </label>
                ))}
              </div>
              <div className="filter-group">
                <label className="filter-option">
                  <input type="checkbox" checked={inStockOnly} onChange={e=>setInStockOnly(e.target.checked)} />
                  <span>In Stock Only</span>
                </label>
              </div>
              <button className="btn btn-outline-dark btn-sm btn-full" style={{marginTop:4}}
                onClick={() => { handleCatChange('All'); setPriceMin(''); setPriceMax(''); setMinRating(0); setInStockOnly(false); }}>
                Clear Filters
              </button>
            </div>
          </aside>
          <div>
            <div className="sort-bar">
              <p className="results-count"><strong>{sorted.length}</strong> products</p>
              <select className="sort-select" value={sort} onChange={e=>setSort(e.target.value)}>
                <option value="featured">Featured</option>
                <option value="price-asc">Price: Low → High</option>
                <option value="price-desc">Price: High → Low</option>
                <option value="rating">Highest Rated</option>
                <option value="newest">Newest First</option>
              </select>
            </div>
            {sorted.length === 0 ? (
              <div className="empty-state">
                <div className="empty-icon">🔍</div>
                <h2 className="empty-title">No products found</h2>
                <p className="empty-sub">Try adjusting your filters or search query.</p>
              </div>
            ) : (
              <div className="product-grid">
                {sorted.map(p => (
                  <ProductCard key={p.id} product={p} setPage={setPage} addToCart={addToCart}
                    toggleWishlist={toggleWishlist} wishlisted={wishlist.includes(p.id)} addToast={addToast} />
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

const CartPage = ({ cart, updateQty, removeItem, setPage, addToast }) => {
  const [coupon, setCoupon] = useState('');
  const [discount, setDiscount] = useState(0);
  const subtotal = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
  const shipping = subtotal > 999 ? 0 : 99;
  const total = subtotal + shipping - discount;
  const applyCoupon = () => {
    if (coupon.toUpperCase() === 'NOVA2024') { setDiscount(Math.floor(subtotal * 0.10)); addToast('Coupon applied! 10% off', 'success'); }
    else addToast('Invalid coupon code', 'error');
  };
  if (cart.length === 0) return (
    <div className="page"><div className="container">
      <div className="empty-state">
        <div className="empty-icon">🛒</div>
        <h2 className="empty-title">Your cart is empty</h2>
        <p className="empty-sub">Looks like you haven't added anything yet.</p>
        <button className="btn btn-primary" onClick={() => setPage('shop')}>Start Shopping</button>
      </div>
    </div></div>
  );
  return (
    <div className="page">
      <div className="container">
        <h1 className="section-title" style={{marginBottom:8}}>Shopping Cart</h1>
        <p style={{fontSize:14,color:'var(--c-ink3)',marginBottom:32}}>{cart.reduce((a,i)=>a+i.qty,0)} items</p>
        <div className="cart-layout">
          <div>
            {cart.map(item => (
              <div key={item.id} className="cart-item fade-in">
                <div className="cart-item-img" style={{background:CAT_COLORS[item.category]+'12'}}>
                  <ProductSVG product={item} size={56} />
                </div>
                <div>
                  <p className="cart-item-cat">{item.category}</p>
                  <p className="cart-item-name">{item.name}</p>
                  <p className="cart-item-price">{fmt(item.price)}</p>
                  <div className="cart-item-actions">
                    <div className="qty-ctrl" style={{borderRadius:6}}>
                      <button className="qty-btn" style={{width:32,height:32}} onClick={() => updateQty(item.id, item.qty-1)}><Icon.Minus /></button>
                      <span className="qty-val" style={{width:36,fontSize:14}}>{item.qty}</span>
                      <button className="qty-btn" style={{width:32,height:32}} onClick={() => updateQty(item.id, item.qty+1)}><Icon.Plus /></button>
                    </div>
                    <button className="remove-btn" onClick={() => { removeItem(item.id); addToast('Removed from cart'); }}>Remove</button>
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <p style={{fontSize:17,fontWeight:700,color:'var(--c-ink)'}}>{fmt(item.price * item.qty)}</p>

              </div>

          </div>
          <div>
            <div className="summary-card">
              <h2 className="summary-title">Order Summary</h2>
              <div className="summary-row"><span className="label">Subtotal</span><span>{fmt(subtotal)}</span></div>
              <div className="summary-row"><span className="label">Shipping</span><span>{shipping === 0 ? <span style={{color:'var(--c-green)'}}>Free</span> : fmt(shipping)}</span></div>
              {discount > 0 && <div className="summary-row"><span className="label">Discount</span><span style={{color:'var(--c-green)'}}>-{fmt(discount)}</span></div>}
              <div className="summary-row total"><span>Total</span><span>{fmt(total)}</span></div>
              <div className="coupon-row">
                <input placeholder="Coupon code (try NOVA2024)" value={coupon} onChange={e=>setCoupon(e.target.value)} />
                <button className="btn btn-outline-dark btn-sm" onClick={applyCoupon}>Apply</button>
              </div>

              <button className="btn btn-outline-dark btn-full btn-sm" style={{marginTop:10}} onClick={() => setPage('shop')}>Continue Shopping</button>

                <Icon.Shield /> <span>Secure SSL checkout</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

                {[65,42,78,55,90,72,85,60,95,82,110,100].map((v,i)=>(
                  <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                    <div style={{width:'100%',background:'var(--c-gold)',borderRadius:'3px 3px 0 0',height:`${v}%`,opacity:i===11?1:0.4,minWidth:8}}/>
                    <span style={{fontSize:10,color:'var(--c-ink3)'}}>{['J','F','M','A','M','J','J','A','S','O','N','D'][i]}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:10,overflow:'hidden'}}>
              <div style={{padding:'16px 20px',borderBottom:'1px solid var(--c-border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <h3 style={{fontSize:15,fontWeight:700}}>Recent Orders</h3>
                <button className="btn btn-outline-dark btn-sm" onClick={()=>setView('orders')}>View All</button>
              </div>
              <table className="admin-table">
                <thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>
                  {orders.slice(0,4).map(o=>(
                    <tr key={o.id}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:13}}>{o.id}</td>
                      <td>Priya Sharma</td>
                      <td style={{color:'var(--c-ink3)'}}>{o.date}</td>
                      <td style={{fontWeight:600}}>{fmt(o.total)}</td>
                      <td><span className={`status-badge ${o.status}`}>{o.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
        {view === 'products' && (
          <div className="fade-in">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
              <div>
                <h1 style={{fontFamily:'var(--font-display)',fontSize:28,marginBottom:2}}>Products</h1>
                <p style={{color:'var(--c-ink3)',fontSize:14}}>{products.length} total products</p>
              </div>
              <button className="btn btn-primary" onClick={()=>{setEditingProduct(null);setNewProd({name:'',category:'Electronics',price:'',stock:'',rating:'4.5',reviews:'0',description:''});setShowModal(true);}}>
                <Icon.Plus /> Add Product
              </button>
            </div>
            <div style={{background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:10,overflow:'hidden'}}>
              <table className="admin-table">
                <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                  {products.map(p => (
                    <tr key={p.id}>
                      <td style={{maxWidth:200}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{width:36,height:36,borderRadius:6,background:CAT_COLORS[p.category]+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            <ProductSVG product={p} size={24} />
                          </div>
                          <span style={{fontWeight:500,fontSize:13,lineHeight:1.3}}>{p.name}</span>
                        </div>
                      </td>
                      <td style={{color:'var(--c-ink3)',fontSize:13}}>{p.category}</td>
                      <td style={{fontWeight:600}}>{fmt(p.price)}</td>
                      <td><span style={p.stock>10?{color:'var(--c-green)',fontWeight:600}:{}} className={p.stock>10?'':'status-badge cancelled'}>{p.stock}</span></td>
                      <td>⭐ {p.rating}</td>
                      <td><span className={`status-badge ${p.stock>0?'active':'inactive'}`}>{p.stock>0?'Active':'OOS'}</span></td>
                      <td>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-outline-dark btn-sm btn-icon" onClick={()=>openEdit(p)}><Icon.Edit /></button>
                          <button className="btn btn-sm btn-icon" style={{border:'1px solid #f5c6cb',color:'var(--c-red)',background:'#fdf2f2'}} onClick={()=>setProducts(ps=>ps.filter(x=>x.id!==p.id))}><Icon.Trash /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {showModal && (
              <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:24}}>
                <div style={{background:'var(--c-surface)',borderRadius:16,padding:32,width:'100%',maxWidth:520,maxHeight:'90vh',overflowY:'auto',boxShadow:'var(--shadow-lg)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>
                    <h2 style={{fontSize:20,fontWeight:700}}>{editingProduct?'Edit':'Add'} Product</h2>
                    <button className="btn btn-outline-dark btn-sm btn-icon" onClick={()=>setShowModal(false)}><Icon.X /></button>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:14}}>
                    <div className="form-group"><label className="form-label">Product Name</label><input className="form-input" value={newProd.name} onChange={setP('name')} placeholder="Product name"/></div>
                    <div className="form-grid">
                      <div className="form-group">
                        <label className="form-label">Category</label>
                        <select className="form-input" value={newProd.category} onChange={setP('category')}>
                          {CATEGORIES.filter(c=>c!=='All').map(c=><option key={c}>{c}</option>)}
                        </select>
                      </div>
                      <div className="form-group"><label className="form-label">Price (₹)</label><input className="form-input" type="number" value={newProd.price} onChange={setP('price')} placeholder="0"/></div>
                      <div className="form-group"><label className="form-label">Stock</label><input className="form-input" type="number" value={newProd.stock} onChange={setP('stock')} placeholder="0"/></div>
                      <div className="form-group"><label className="form-label">Rating</label><input className="form-input" type="number" step="0.1" min="1" max="5" value={newProd.rating} onChange={setP('rating')} placeholder="4.5"/></div>
                    </div>
                    <div className="form-group"><label className="form-label">Description</label><textarea className="form-input" rows={3} value={newProd.description} onChange={setP('description')} placeholder="Product description" style={{resize:'vertical'}}/></div>
                    <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
                      <button className="btn btn-outline-dark" onClick={()=>setShowModal(false)}>Cancel</button>
                      <button className="btn btn-primary" onClick={saveProduct}>{editingProduct?'Save Changes':'Add Product'}</button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
        {view === 'orders' && (
          <div className="fade-in">
            <h1 style={{fontFamily:'var(--font-display)',fontSize:28,marginBottom:24}}>All Orders</h1>
            <div style={{background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:10,overflow:'hidden'}}>
              <table className="admin-table">
                <thead><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                  {orders.map(o=>(
                    <tr key={o.id}>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:600}}>{o.id}</td>
                      <td style={{color:'var(--c-ink3)'}}>{o.date}</td>
                      <td>{o.items.length} item{o.items.length!==1?'s':''}</td>
                      <td style={{fontWeight:700}}>{fmt(o.total)}</td>
                      <td><span className={`status-badge ${o.status}`}>{o.status}</span></td>
                      <td><button className="btn btn-outline-dark btn-sm" style={{fontSize:12}}>View Details</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
        {view === 'customers' && (
          <div className="fade-in">
            <h1 style={{fontFamily:'var(--font-display)',fontSize:28,marginBottom:24}}>Customers</h1>
            <div style={{background:'var(--c-surface)',border:'1px solid var(--c-border)',borderRadius:10,overflow:'hidden'}}>
              <table className="admin-table">
                <thead><tr><th>Name</th><th>Email</th><th>Orders</th><th>Total Spend</th><th>Status</th></tr></thead>
                <tbody>
                  {[
                    {name:'Priya Sharma',email:'priya@example.com',orders:4,spend:49490,status:'active'},
                    {name:'Rahul Mehta',email:'rahul@example.com',orders:2,spend:24998,status:'active'},
                    {name:'Ananya Kumar',email:'ananya@example.com',orders:7,spend:89432,status:'active'},
                    {name:'Vikram Singh',email:'vikram@example.com',orders:1,spend:5499,status:'active'},
                    {name:'Neha Patel',email:'neha@example.com',orders:3,spend:32000,status:'inactive'},
                  ].map(c=>(
                    <tr key={c.email}>
                      <td style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:32,height:32,borderRadius:'50%',background:'var(--c-gold-lt)',color:'var(--c-gold)',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{c.name[0]}</div>
                        <span style={{fontWeight:500}}>{c.name}</span>
                      </td>
                      <td style={{color:'var(--c-ink3)',fontSize:13}}>{c.email}</td>
                      <td>{c.orders}</td>
                      <td style={{fontWeight:600}}>{fmt(c.spend)}</td>
                      <td><span className={`status-badge ${c.status}`}>{c.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

const Footer = ({ setPage }) => (
  <footer>
    <div className="container">
      <div className="footer-grid">
        <div>
          <div className="footer-brand">NO<span>V</span>A</div>
          <p className="footer-desc">Premium products from around the world, curated for discerning tastes. Quality, design, and everyday excellence.</p>
        </div>
        {[
          { heading:'Shop', links:['All Products','Electronics','Fashion','Home & Living','Sale Items'] },
          { heading:'Account', links:['Sign In','Register','My Orders','Wishlist','Settings'] },
          { heading:'Help', links:['Contact Us','Shipping Info','Returns','Track Order','FAQ'] },
        ].map(col => (
          <div key={col.heading}>
            <div className="footer-heading">{col.heading}</div>
            {col.links.map(l => <span key={l} className="footer-link" onClick={()=>setPage('shop')}>{l}</span>)}
          </div>
        ))}
      </div>
      <div className="footer-bottom">
        <span>© 2024 NOVA Commerce. All rights reserved.</span>
        <div style={{display:'flex',gap:16}}>
          {['Privacy Policy','Terms of Service','Cookie Policy'].map(l=>(
            <span key={l} style={{color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:13,transition:'color 0.18s'}}
              onMouseEnter={e=>e.target.style.color='rgba(255,255,255,0.7)'}
              onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.4)'}>{l}</span>
          ))}
        </div>
      </div>
    </div>
  </footer>
);

const App = () => {
  const [page, setPage] = useState('home');
  const [cart, setCart] = useState([]);
  const [wishlist, setWishlist] = useState([]);
  const [user, setUser] = useState(null);
  const [search, setSearch] = useState('');
  const [toasts, setToasts] = useState([]);
  const [orders, setOrders] = useState(MOCK_ORDERS);
  const [shopCategory, setShopCategory] = useState('All');

  const goToCategory = useCallback((cat) => { setShopCategory(cat); setPage('shop'); }, []);

  const addToast = useCallback((msg, type = '') => {
    const id = Date.now();
    setToasts(ts => [...ts, { id, msg, type }]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 3000);
  }, []);

  const addToCart = useCallback((product, qty = 1) => {
    setCart(c => {
      const ex = c.find(i => i.id === product.id);
      if (ex) return c.map(i => i.id === product.id ? {...i, qty: i.qty + qty} : i);
      return [...c, {...product, qty}];
    });
  }, []);

  const updateQty = useCallback((id, qty) => {
    if (qty < 1) { setCart(c => c.filter(i => i.id !== id)); return; }
    setCart(c => c.map(i => i.id === id ? {...i, qty} : i));
  }, []);

  const removeItem = useCallback((id) => setCart(c => c.filter(i => i.id !== id)), []);
  const clearCart = useCallback(() => setCart([]), []);
  const toggleWishlist = useCallback((id) => setWishlist(w => w.includes(id) ? w.filter(x=>x!==id) : [...w,id]), []);

  const isDetail = page.startsWith('detail:');
  const detailId = isDetail ? parseInt(page.split(':')[1]) : null;
  const currentProduct = isDetail ? MOCK_PRODUCTS.find(p => p.id === detailId) : null;

  const isAuthPage = page === 'auth';
  const isAdminPage = page === 'admin';
  const hideNav = isAuthPage || isAdminPage;
  const hideFooter = isAuthPage || isAdminPage;

  const renderPage = () => {
    if (page === 'home') return <HomePage products={MOCK_PRODUCTS} setPage={setPage} addToCart={addToCart} toggleWishlist={toggleWishlist} wishlist={wishlist} addToast={addToast} goToCategory={goToCategory} />;
    if (page === 'shop') return <ShopPage products={MOCK_PRODUCTS} setPage={setPage} addToCart={addToCart} toggleWishlist={toggleWishlist} wishlist={wishlist} addToast={addToast} searchQuery={search} initialCategory={shopCategory} onCategoryChange={setShopCategory} />;
    if (isDetail) return <DetailPage product={currentProduct} setPage={setPage} addToCart={addToCart} toggleWishlist={toggleWishlist} wishlisted={wishlist.includes(detailId)} addToast={addToast} />;
    if (page === 'cart') return <CartPage cart={cart} updateQty={updateQty} removeItem={removeItem} setPage={setPage} addToast={addToast} />;
    if (page === 'checkout') return <CheckoutPage cart={cart} setPage={setPage} addToast={addToast} clearCart={clearCart} user={user} />;
    if (page === 'auth') return <AuthPage setUser={setUser} setPage={setPage} addToast={addToast} cart={cart} wishlist={wishlist} user={user} />;
    if (page === 'profile') return user ? <ProfilePage user={user} setUser={setUser} setPage={setPage} orders={orders} addToast={addToast} /> : <AuthPage setUser={setUser} setPage={setPage} addToast={addToast} cart={cart} wishlist={wishlist} user={user} />;
    if (page === 'orders') return user ? <ProfilePage user={user} setUser={setUser} setPage={setPage} orders={orders} addToast={addToast} /> : <AuthPage setUser={setUser} setPage={setPage} addToast={addToast} cart={cart} wishlist={wishlist} user={user} />;
    if (page === 'wishlist') return <WishlistPage wishlist={wishlist} products={MOCK_PRODUCTS} setPage={setPage} addToCart={addToCart} toggleWishlist={toggleWishlist} addToast={addToast} />;
    if (page === 'admin') return user?.isAdmin ? <AdminPanel products={MOCK_PRODUCTS} orders={orders} setPage={setPage} /> : <AuthPage setUser={setUser} setPage={setPage} addToast={addToast} cart={cart} wishlist={wishlist} user={user} />;
    return <HomePage products={MOCK_PRODUCTS} setPage={setPage} addToCart={addToCart} toggleWishlist={toggleWishlist} wishlist={wishlist} addToast={addToast} goToCategory={goToCategory} />;
  };

  return (
    <AppContext.Provider value={{ cart, wishlist, user, page, setPage, addToast, addToCart, toggleWishlist }}>
      {!hideNav && (
        <Navbar page={page} setPage={setPage} cart={cart} wishlist={wishlist} user={user} search={search} setSearch={setSearch} />
      )}
      <main>{renderPage()}</main>
      {!hideFooter && <Footer setPage={setPage} />}
      <ToastContainer toasts={toasts} />
    </AppContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
